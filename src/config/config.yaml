# Application configuration (non-secret settings)
# Secret data (API keys, tokens) lives in the .env file
#
# Priority: environment variables (.env) > YAML > built-in defaults

# ============================================================================
# PROVIDERS (Auto-Discovery)
# ============================================================================
# Providers are auto-discovered from the environment variables in .env!
# No configuration is required here.
#
# Environment-variable patterns:
#   - Hetzner: HETZNER_{SUFFIX}_API_KEY -> alias=hetzner_{suffix}
#   - Vultr: VULTR_{SUFFIX}_API_KEY -> alias=vultr_{suffix}
#   - AWS: AWS_{SUFFIX}_ACCESS_KEY_ID + AWS_{SUFFIX}_SECRET_ACCESS_KEY -> alias=aws_{suffix}
#
# .env examples:
#   HETZNER_PROD_API_KEY=xxx  -> alias=hetzner_prod, display="Hetzner (prod)"
#   HETZNER_STAGING_API_KEY=xxx     -> alias=hetzner_staging, display="Hetzner (staging)"
#   VULTR_MAIN_API_KEY=xxx      -> alias=vultr_main, display="Vultr" ("main" is hidden)
#   AWS_PROD_ACCESS_KEY_ID=xxx  -> alias=aws_prod, display="AWS (prod)"
#
# Emoji is assigned automatically: [H] for Hetzner, [V] for Vultr, [A] for AWS
#
# ADMIN_IDS also lives in .env (Telegram user IDs of the bot admins)

# ============================================================================
# MONITORING SETTINGS
# ============================================================================
monitoring:
  ping_interval: 60      # Ping interval in seconds (10-3600)
  ping_timeout: 5        # Ping timeout in seconds (1-30)
  ping_attempts: 3       # Attempts before marking offline (1-10)

# Balance settings
balance:
  threshold: 100.0       # Default alert threshold in USD (seeds runtime_settings until changed in-bot)
  check_interval: 10800  # Check interval in seconds (3 hours)

# Server synchronization
sync:
  servers_interval: 600  # Sync interval in seconds (10 minutes)

# Statistics
stats:
  retention_days: 30     # Rolling statistics retention window in days (1-365)

# Service checks (TCP / HTTP / SSL health checks beyond ICMP ping)
checks:
  interval: 60           # Default TCP/HTTP check interval in seconds (10-3600)
  tcp_timeout: 5         # TCP connect-check timeout in seconds (1-60)
  http_timeout: 10       # HTTP endpoint-check timeout in seconds (1-60)
  ssl_interval: 21600    # SSL expiry-check interval in seconds (3600-86400)
  ssl_warn_days: 14      # Default days-before-expiry to start warning (1-365)

# Logging
logging:
  level: INFO            # DEBUG, INFO, WARNING, ERROR, CRITICAL

# Paths
data:
  directory: data        # Data directory
